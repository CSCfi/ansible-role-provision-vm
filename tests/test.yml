---

-   name: Playbook for CI testing.
    hosts: hypervisor
    remote_user: root
    vars:
        - install_extra_packages:
            - bridge-utils
            - libvirt
            - NetworkManager
            - openssh-server
            - python3-libvirt
            - qemu-kvm
            - qemu-img
            - virt-install
            - virt-top
    pre_tasks:
        - package:
            name: "{{ item }}"
            state: present
          when: install_extra_packages is defined
          loop: "{{ install_extra_packages }}"

        - file:
           path: "/etc/libvirt/qemu/"
           state: directory
           recurse: yes

        - file:
           path: "/etc/libvirt/qemu/{{ inventory_hostname }}.xml"
           state: touch

        - service:
            name: "{{ item }}"
            state: started
            enabled: yes
          with_items:
            - "sshd"
            - "libvirtd"
            - "NetworkManager"

        - name: Create network bridge br-example
          command: >
            nmcli connection add type bridge con-name br-example ifname br-example 
            ip4 192.168.1.1/24 
            gw4 192.168.1.254
          notify: restart network

        - name: Add physical interface to the bridge
          command: "nmcli connection add type ethernet con-name br-example-slave ifname eth0 master br-example"
          notify: restart network
        
        - name: Add target VMs dynamically based on the hypervisor OS
          ansible.builtin.add_host:
            name: "{{ item }}"
            groups: provision_vm
          loop: >- 
            {{ 
              groups['centos8'] if ansible_distribution_major_version == '8' 
              else (groups['centos8'] + groups['almalinux9']) 
            }}
          when: ansible_distribution_major_version == '8' or ansible_distribution_major_version == '9'

    handlers:
        - name: restart network
          service:
            name: NetworkManager
            state: restarted

-   name: Playbook for CI testing.
    hosts: provision_vm
    remote_user: root
    vars:
        - hyper: "hypervisor"
        - bridges: [ "br-example" ]
        - provision_cleanup_runtimedir: False
        - root_password: "{{ lookup('password', 'credentials/'+ inventory_hostname  +'_rootpw length=15 chars=ascii_letters,digits,hexdigits,.,_,,') }}"
        - dns1: "8.8.8.8"
        - network_mask: "255.255.255.0"
        - network_prefix: "/24"
        - network_gateway4: "192.168.1.1"
        - internal_ip: "{{ network_address }}"

    roles:
        - ansible-role-provision-vm

...
